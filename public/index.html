<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eficell WebMail</title>
    <!-- Dependencies -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS is loaded dynamically via styles.json in app.js -->
</head>
<body>

<header id="app-header" class="hidden">
    <div class="logo"><i class="fa-solid fa-rocket"></i> Eficell WebMail</div>
    <div class="user-info">
        <span id="current-user-email">cargando...</span>
        <a href="#" id="btn-logout"><i class="fa-solid fa-arrow-right-from-bracket"></i> Salir</a>
    </div>
</header>

<div id="app-container" class="container hidden">
    <aside class="sidebar">
        <button id="btn-compose-nav" class="btn-compose">
            <i class="fa-solid fa-pen"></i> Redactar
        </button>
        <ul id="folder-list" class="folder-list">
            <!-- Folders dynamically loaded -->
        </ul>
    </aside>

    <main class="main-content">
        <div id="status-bar" class="status-msg"></div>

        <!-- LIST VIEW -->
        <div id="view-list" style="display: flex; flex-direction: column; height: 100%;">
            <div class="toolbar">
                <h3 id="current-folder-title">Bandeja de entrada</h3>
                <button id="btn-refresh" class="btn-icon" title="Actualizar">
                    <i class="fa-solid fa-rotate-right"></i>
                </button>
            </div>
            <div id="list-loader" class="status-info hidden">
                <i class="fa-solid fa-circle-notch fa-spin"></i> Cargando correos...
            </div>
            <ul id="email-list" class="email-list hidden">
                <!-- Emails injected via app.js -->
            </ul>
        </div>

        <!-- DETAIL VIEW -->
        <div id="view-detail" class="email-detail-container">
            <div class="toolbar">
                <button id="btn-back-to-list" class="btn-icon" title="Volver a la lista">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <div class="toolbar-actions" style="display: flex; gap: 8px;">
                    <button id="btn-detail-reply" class="btn-icon" title="Responder">
                        <i class="fa-solid fa-reply"></i>
                    </button>
                    <button id="btn-detail-trash" class="btn-icon" style="color: var(--danger);" title="Eliminar">
                        <i class="fa-regular fa-trash-can"></i>
                    </button>
                </div>
            </div>
            <div id="detail-loader" class="status-info">
                <i class="fa-solid fa-circle-notch fa-spin"></i> Cargando mensaje completo...
            </div>
            <div id="detail-content" class="hidden" style="display: flex; flex-direction: column; height: 100%;">
                <div class="email-header">
                    <h2 id="detail-subject">Cargando...</h2>
                    <div class="email-meta-info">
                        <div class="email-sender-wrapper">
                            <!-- Injected via JS (avatar + name + to) -->
                        </div>
                        <div id="detail-date"></div>
                    </div>
                </div>
                <div id="detail-attachments" class="attachments-container hidden">
                    <!-- Attachments -->
                </div>
                <div class="email-body" id="detail-body">
                    <!-- HTML body injected via iframe in app.js -->
                </div>
            </div>
        </div>

        <!-- COMPOSE VIEW -->
        <div id="view-compose" class="compose-container">
            <div class="toolbar">
                <h3>Nuevo Mensaje</h3>
            </div>
            <form id="compose-form" class="compose-form">
                <div class="compose-headers">
                    <div class="compose-field">
                        <label for="compose-to">Para</label>
                        <input type="email" id="compose-to" required>
                    </div>
                    <div class="compose-field">
                        <label for="compose-cc">Cc</label>
                        <input type="text" id="compose-cc" placeholder="(Opcional)">
                    </div>
                    <div class="compose-field">
                        <label for="compose-subject">Asunto</label>
                        <input type="text" id="compose-subject">
                    </div>
                    <div class="compose-field" style="border-bottom: none;">
                        <label for="compose-attachments"><i class="fa-solid fa-paperclip"></i> Adjuntos</label>
                        <input type="file" id="compose-attachments" multiple title="Adjuntar archivos">
                    </div>
                </div>

                <!-- Quill Editor -->
                <div id="editor-container"></div>

                <div class="compose-actions">
                    <button type="submit" id="btn-send" class="btn-send">
                        <i class="fa-solid fa-paper-plane"></i> Enviar Mensaje
                    </button>
                    <button type="button" id="btn-discard" class="btn-icon" style="color: var(--text-light); margin-left: auto;" title="Descartar">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </div>
            </form>
        </div>
    </main>
</div>

<!-- Login Modal -->
<div id="login-modal" class="modal-overlay">
    <div class="login-box">
        <h2><i class="fa-solid fa-rocket"></i> Eficell WebMail</h2>
        <p style="color: var(--text-light); font-size: 0.875rem; margin-bottom: 24px;">Conectando a mail.spacemail.com</p>

        <form id="login-form" class="login-form">
            <div class="login-input-group">
                <input type="email" id="login-email" placeholder=" " required>
                <label for="login-email">Correo Electrónico (@eficell.cl)</label>
            </div>
            <div class="login-input-group">
                <input type="password" id="login-password" placeholder=" " required>
                <label for="login-password">Contraseña</label>
            </div>
            <div class="login-input-group">
                <input type="text" id="login-sender-name" placeholder=" ">
                <label for="login-sender-name">Nombre a mostrar al enviar (Opcional)</label>
            </div>
            <button type="submit" class="btn-login" id="btn-login-submit">Siguiente</button>
        </form>
        <div id="login-error" style="color: var(--danger); margin-top: 16px; font-size: 0.875rem; display: none;"></div>
    </div>
</div>

<!-- Logic -->
<script src="app.js"></script>
</body>
</html>
